<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Background circle (globe-like) -->
  <circle cx="50" cy="50" r="48" fill="#0A192F" stroke="#00FFFF" stroke-width="1.5" opacity="0.9"/>
  <!-- Globe latitude lines -->
  <ellipse cx="50" cy="36" rx="44" ry="12" fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.35"/>
  <ellipse cx="50" cy="50" rx="47" ry="14" fill="none" stroke="#00FFFF" stroke-width="0.9" opacity="0.45"/>
  <ellipse cx="50" cy="64" rx="42" ry="12" fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.3"/>
  <!-- Globe longitude lines -->
  <ellipse cx="50" cy="50" rx="14" ry="47" fill="none" stroke="#00FFFF" stroke-width="0.7" opacity="0.3"/>
  <ellipse cx="50" cy="50" rx="30" ry="47" fill="none" stroke="#00FFFF" stroke-width="0.7" opacity="0.3"/>
  <!-- Letter C -->
  <text x="50" y="68" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700"
    fill="url(#cGrad)" text-anchor="middle" dominant-baseline="auto">C</text>
  <defs>
    <linearGradient id="cGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#7CB8DE"/>
    </linearGradient>
  </defs>
</svg>
