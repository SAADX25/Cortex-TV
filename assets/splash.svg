<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2732 2732" width="2732" height="2732">
  <defs>
    <!-- Deep blue radial background matching app theme -->
    <radialGradient id="splashBg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0F2847"/>
      <stop offset="60%" stop-color="#0A192F"/>
      <stop offset="100%" stop-color="#050E1A"/>
    </radialGradient>

    <!-- Subtle grid pattern for depth -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(0,255,255,0.015)" stroke-width="0.5"/>
    </pattern>

    <!-- Earth gradient for center logo -->
    <radialGradient id="splashEarth" cx="45%" cy="40%" r="42%">
      <stop offset="0%" stop-color="#1B4F8A"/>
      <stop offset="50%" stop-color="#0E3460"/>
      <stop offset="100%" stop-color="#091E3A"/>
    </radialGradient>

    <!-- Metallic C gradient -->
    <linearGradient id="splashMetalC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="20%" stop-color="#B0D4F1"/>
      <stop offset="40%" stop-color="#E0EFF9"/>
      <stop offset="55%" stop-color="#7CB8DE"/>
      <stop offset="75%" stop-color="#C5E2F5"/>
      <stop offset="100%" stop-color="#8EC8E8"/>
    </linearGradient>

    <linearGradient id="splashMetalCshadow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3A7BB8"/>
      <stop offset="50%" stop-color="#5A9FD4"/>
      <stop offset="100%" stop-color="#2A6090"/>
    </linearGradient>

    <!-- Glow filters -->
    <filter id="splashOuterGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="18"/>
      <feFlood flood-color="#00FFFF" flood-opacity="0.2"/>
      <feComposite in2="SourceAlpha" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00FFFF" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="splashGlobeClip">
      <circle cx="1366" cy="1240" r="280"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="2732" height="2732" fill="url(#splashBg)"/>
  <rect width="2732" height="2732" fill="url(#grid)"/>

  <!-- Decorative outer ring -->
  <circle cx="1366" cy="1240" r="350" fill="none" stroke="rgba(0,255,255,0.04)" stroke-width="1"/>
  <circle cx="1366" cy="1240" r="420" fill="none" stroke="rgba(0,255,255,0.02)" stroke-width="0.5"/>

  <!-- Earth sphere -->
  <circle cx="1366" cy="1240" r="280" fill="url(#splashEarth)"/>

  <!-- Neural network inside globe -->
  <g clip-path="url(#splashGlobeClip)" opacity="0.5">
    <ellipse cx="1366" cy="1110" rx="254" ry="66" fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.25"/>
    <ellipse cx="1366" cy="1240" rx="280" ry="74" fill="none" stroke="#00FFFF" stroke-width="1" opacity="0.35"/>
    <ellipse cx="1366" cy="1370" rx="246" ry="62" fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.2"/>
    <ellipse cx="1366" cy="1240" rx="74" ry="280" fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.2"/>
    <ellipse cx="1366" cy="1240" rx="164" ry="280" fill="none" stroke="#00FFFF" stroke-width="0.8" opacity="0.25"/>

    <!-- Nodes -->
    <circle cx="1258" cy="1148" r="3.5" fill="#00FFFF" opacity="0.7"/>
    <circle cx="1422" cy="1120" r="3" fill="#00FFFF" opacity="0.6"/>
    <circle cx="1315" cy="1272" r="3" fill="#00FFFF" opacity="0.5"/>
    <circle cx="1480" cy="1216" r="3.5" fill="#00FFFF" opacity="0.65"/>
    <circle cx="1270" cy="1354" r="2.5" fill="#00FFFF" opacity="0.45"/>
    <circle cx="1400" cy="1330" r="3" fill="#00FFFF" opacity="0.55"/>

    <!-- Connections -->
    <line x1="1258" y1="1148" x2="1422" y2="1120" stroke="#00FFFF" stroke-width="0.8" opacity="0.3"/>
    <line x1="1422" y1="1120" x2="1480" y2="1216" stroke="#00FFFF" stroke-width="0.8" opacity="0.25"/>
    <line x1="1315" y1="1272" x2="1480" y2="1216" stroke="#00FFFF" stroke-width="0.8" opacity="0.25"/>
    <line x1="1258" y1="1148" x2="1315" y2="1272" stroke="#00FFFF" stroke-width="0.8" opacity="0.3"/>
    <line x1="1315" y1="1272" x2="1400" y2="1330" stroke="#00FFFF" stroke-width="0.8" opacity="0.25"/>
    <line x1="1270" y1="1354" x2="1400" y2="1330" stroke="#00FFFF" stroke-width="0.8" opacity="0.2"/>
  </g>

  <!-- Atmosphere rim -->
  <circle cx="1366" cy="1240" r="282" fill="none" stroke="rgba(0,255,255,0.1)" stroke-width="3"/>

  <!-- Metallic C -->
  <g filter="url(#splashOuterGlow)">
    <path d="M 1454,1040 A 180,180 0 1,0 1454,1440 L 1454,1400 A 140,140 0 1,1 1454,1080 Z"
          fill="url(#splashMetalCshadow)" opacity="0.6" transform="translate(2,2)"/>
    <path d="M 1454,1040 A 180,180 0 1,0 1454,1440 L 1454,1400 A 140,140 0 1,1 1454,1080 Z"
          fill="url(#splashMetalC)"/>
    <path d="M 1454,1044 A 178,178 0 0,0 1232,1106 A 132,132 0 0,1 1454,1084 Z"
          fill="white" opacity="0.12"/>
  </g>

  <!-- App name text -->
  <text x="1366" y="1580" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="64" font-weight="700" letter-spacing="18" fill="white" opacity="0.9"
        filter="url(#textGlow)">
    CORTEX TV
  </text>

  <!-- Tagline -->
  <text x="1366" y="1630" text-anchor="middle" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif"
        font-size="24" font-weight="400" letter-spacing="8" fill="#00FFFF" opacity="0.4">
    GLOBAL IPTV EXPLORER
  </text>

  <!-- Bottom pulse dot -->
  <circle cx="1366" cy="1700" r="4" fill="#00FFFF" opacity="0.3"/>
</svg>
